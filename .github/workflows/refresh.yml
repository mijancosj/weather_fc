name: Trigger data refresh

# The backend runs on a free-tier host that suspends the process when idle
# (see docs/deployment.md), so its own in-process scheduler can't be relied
# on to tick reliably in production. This calls the protected refresh route
# instead — same effect, driven externally on a schedule GitHub runs for us
# for free.
on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: POST /api/v1/internal/refresh
        run: |
          # The route responds as soon as the refresh is *triggered* (202),
          # not once it's finished — waiting for full completion risked
          # exceeding Render's own proxy timeout on a cold start (seen live
          # as a 502 from Render, not an application error).
          #
          # Separately, the request can time out before Render even starts
          # responding: a cold start stacks Render's own process boot (uv
          # resolving packages, uvicorn, DB pool, APScheduler) on top of
          # Neon's free tier separately autosuspending its compute and
          # needing its own wake-up on the first query — confirmed live to
          # occasionally exceed 60s combined. curl reports that as its own
          # exit code 28 (timeout), not an HTTP status, since no response
          # ever arrived. A generous per-attempt timeout plus a couple of
          # retries covers a slow wake without masking a real failure.
          status="000"
          for attempt in 1 2 3; do
            set +e
            status=$(curl -s -o /tmp/response.json -w "%{http_code}" \
              --max-time 120 \
              -X POST "${BACKEND_URL}/api/v1/internal/refresh" \
              -H "X-Refresh-Token: ${REFRESH_TOKEN}")
            curl_exit=$?
            set -e
            if [ "$curl_exit" -eq 0 ]; then
              break
            fi
            echo "Attempt $attempt: curl exited $curl_exit (likely still waking up), retrying..."
            sleep 15
          done
          echo "HTTP status: $status"
          cat /tmp/response.json
          if [ "$status" != "202" ]; then
            echo "Refresh trigger failed"
            exit 1
          fi
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
